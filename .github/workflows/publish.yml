name: Publish to npm

# Publishes the package when a version tag (vX.Y.Z) is pushed.
# Requires a repository secret NPM_TOKEN (an npm "Automation" access token).
# Note: the version in package.json must be new — npm rejects re-publishing an
# existing version, so bump the version before tagging.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
